{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Где я?</title>
    <link rel="stylesheet" href="{% static 'mainpage/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body class="page-home">
    {% include 'mainpage/_institute_logo.html' %}

    <div class="background-slider"></div>

    <div class="content">
        <h1>День открытых дверей СФУ</h1>
        <a href="{% url 'play' %}" class="play-button">Играть</a>

        <div class="home-extra-buttons">
            <a href="{% url 'records' %}" class="mode-button home-extra-button">Рекорды</a>
            <a href="{% url 'how_to_play' %}" class="mode-button home-extra-button">Как играть</a>
        </div>

        <div class="home-cubes" aria-label="Кубики СФУ">
            <div class="cube-wrap">
                <div class="cube cube-c">
                    <span class="cube-face cube-face--front">С</span>
                    <span class="cube-face cube-face--back">С</span>
                    <span class="cube-face cube-face--right">С</span>
                    <span class="cube-face cube-face--left">С</span>
                    <span class="cube-face cube-face--top">С</span>
                    <span class="cube-face cube-face--bottom">С</span>
                </div>
            </div>
            <div class="cube-wrap">
                <div class="cube cube-f">
                    <span class="cube-face cube-face--front">Ф</span>
                    <span class="cube-face cube-face--back">Ф</span>
                    <span class="cube-face cube-face--right">Ф</span>
                    <span class="cube-face cube-face--left">Ф</span>
                    <span class="cube-face cube-face--top">Ф</span>
                    <span class="cube-face cube-face--bottom">Ф</span>
                </div>
            </div>
            <div class="cube-wrap">
                <div class="cube cube-u">
                    <span class="cube-face cube-face--front">У</span>
                    <span class="cube-face cube-face--back">У</span>
                    <span class="cube-face cube-face--right">У</span>
                    <span class="cube-face cube-face--left">У</span>
                    <span class="cube-face cube-face--top">У</span>
                    <span class="cube-face cube-face--bottom">У</span>
                </div>
            </div>
        </div>
    </div>

    {% include 'mainpage/_site_footer.html' %}

    <script src="{% static 'mainpage/script.js' %}"></script>
</body>
</html>
