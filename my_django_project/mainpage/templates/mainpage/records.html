{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекорды</title>
    <link rel="stylesheet" href="{% static 'mainpage/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .records-container {
            z-index: 2;
            position: relative;
            width: 80%;
            margin: 50px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
        }

        .tables-row {
            display: flex;
            gap: 40px;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 30px;
        }

        .table-section {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.2rem;
        }

        th, td {
            padding: 10px;
            border: 2px solid #fff;
            text-shadow: 1px 1px 2px #000;
        }

        th {
            background: #5c7cfa;
        }

        td {
            background: rgba(255, 255, 255, 0.2);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 30px;
            background-color: #5c7cfa;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="background-slider"></div>

    <div class="records-container">
        <h1>Рекорды</h1>

        <div class="tables-row">
            <div class="table-section">
                <h2>СФУ</h2>
                <table>
                    <tr><th>Имя</th><th>Очки</th></tr>
                    {% for record in sfu_records %}
                        <tr><td>{{ record.name }}</td><td>{{ record.score }}</td></tr>
                    {% endfor %}
                </table>
            </div>

            <div class="table-section">
                <h2>Красноярск</h2>
                <table>
                    <tr><th>Имя</th><th>Очки</th></tr>
                    {% for record in kras_records %}
                        <tr><td>{{ record.name }}</td><td>{{ record.score }}</td></tr>
                    {% endfor %}
                </table>
            </div>
        </div>
    </div>

    <a href="{% url 'play' %}" class="back-btn">Назад</a>

    {% include 'mainpage/_site_footer.html' %}

    <script src="{% static 'mainpage/script.js' %}"></script>
</body>
</html>
