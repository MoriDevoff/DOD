{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Режим Красноярск</title>
    <link rel="stylesheet" href="{% static 'mainpage/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Общий контейнер для игры — фиксированная структура */
        .game-container {
            display: flex;
            width: 100vw;
            height: 80vh;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .photo-section {
            width: 35%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            overflow-y: auto;
        }

        .photo-section img {
            width: 100%;
            max-height: 50vh;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .map-section {
            width: 65%;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
            border-left: 4px solid #fff;
        }

        /* Уведомление под фото — стилизовано ретро */
        #round-result {
            background: rgba(231, 76, 60, 0.9);
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            text-align: center;
            width: 100%;
            transition: opacity 0.3s ease;
        }

        #round-result.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #confirm-btn {
            padding: 10px 30px;
            font-size: 1.5rem;
            background-color: #5c7cfa;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #confirm-btn:hover {
            transform: scale(1.05);
        }

        #confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .button2 {
            padding: 10px 30px;
            font-size: 1.5rem;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-family: 'Exo 2', system-ui, sans-serif;
            width: 100%;
            max-width: 260px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
        }

        .button2:hover {
            transform: scale(1.05);
        }

        /* Финальное модальное — по центру, с блюром */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            width: 40%;
            border: 2px solid #5c7cfa;
        }

        .modal-content input {
            padding: 10px;
            margin: 10px 0;
            width: 80%;
            font-size: 1rem;
            font-family: 'Exo 2', system-ui, sans-serif;
            background: #333;
            color: white;
            border: 2px solid #5c7cfa;
        }

        .blur {
            filter: blur(5px);
            pointer-events: none;
        }

        .round-info {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
            color: #fff;
        }

        #name-error {
            color: #ff6b6b;
            font-size: 1rem;
            min-height: 20px;
        }

        #submit-name {
            padding: 15px 40px;
            font-size: 1.6rem;
            background-color: #5c7cfa;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            font-family: 'Exo 2', system-ui, sans-serif;
        }

        #submit-name:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            background-color: #4c6ef5;
        }

        #submit-name:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="background-slider"></div>

    <div class="game-container">
        <div class="photo-section">
            <div class="round-info">Раунд {{ current_round }} из 5</div>
            <img src="{{ photo_url }}" alt="Угадайте место">
            <div id="round-result" class="hidden"></div>
            <button id="confirm-btn">Подтвердить выбор</button>
            <a class="button2" id="exit-btn" href="{% url 'reset_game' 'sfu' %}">Выйти</a>
        </div>
        <div class="map-section">
            <div id="map"></div>
        </div>
    </div>

    <!-- Финальное модальное окно -->
    <div id="final-modal" class="modal">
        <div class="modal-content">
            <h2>Итоговый счёт</h2>
            <p>Очки за последний раунд: <span id="last-score">0</span></p>
            <p>Ваши итоговые очки: <span id="total-score">0</span></p>
            <input type="text" id="player-name" placeholder="Ваше имя">
            <p id="name-error"></p>
            <button id="submit-name">Сохранить рекорд</button>
        </div>
    </div>

    <script>
        const CSRF_TOKEN = '{{ csrf_token }}';

        // Стартовый обзор: студгородок + основной кампус СФУ
        const map = L.map('map').setView([56.005, 92.815], 12);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            referrerPolicy: 'strict-origin-when-cross-origin',
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        map.attributionControl.setPrefix(false);

        const greenIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        let userMarker = null;
        let correctMarker = null;
        let distanceLine = null;

        map.on('click', function(e) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(e.latlng).addTo(map);
        });

        const confirmBtn = document.getElementById('confirm-btn');
        let nextCooldownIntervalId = null;
        const exitBtn = document.getElementById('exit-btn');

        exitBtn.addEventListener('click', (e) => {
            const ok = window.confirm('Выйти и сбросить текущую игру?');
            if (!ok) e.preventDefault();
        });

        confirmBtn.addEventListener('click', async function() {
            // На 5-м раунде сначала меняем текст на "Сохранить результат",
            // а окно открывается только после повторного клика.
            if (confirmBtn.textContent === 'Сохранить результат') {
                document.getElementById('final-modal').style.display = 'flex';
                document.querySelector('.game-container').classList.add('blur');
                confirmBtn.disabled = true;
                return;
            }

            if (confirmBtn.textContent.startsWith('Далее')) return;
            if (!userMarker) return alert('Отметьте место на карте!');

            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Обработка...';

            const formData = new FormData();
            formData.append('confirm_guess', 'true');
            formData.append('lat', userMarker.getLatLng().lat);
            formData.append('lon', userMarker.getLatLng().lng);
            formData.append('csrfmiddlewaretoken', CSRF_TOKEN);

            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': CSRF_TOKEN },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('round-result').innerHTML =
                        `Очки: ${data.score}<br>Расстояние: ${data.distance} км`;
                    document.getElementById('round-result').classList.remove('hidden');

                    if (correctMarker) map.removeLayer(correctMarker);
                    if (distanceLine) map.removeLayer(distanceLine);

                    correctMarker = L.marker(
                        [data.correct_lat, data.correct_lon],
                        { icon: greenIcon }
                    ).addTo(map);
                    distanceLine = L.polyline(
                        [[data.correct_lat, data.correct_lon], userMarker.getLatLng()],
                        {color: 'red', weight: 3}
                    ).addTo(map);

                    map.fitBounds([
                        [data.correct_lat, data.correct_lon],
                        userMarker.getLatLng()
                    ], {padding: [50, 50]});

                    if (!data.is_last_round) {
                        if (nextCooldownIntervalId) {
                            clearInterval(nextCooldownIntervalId);
                            nextCooldownIntervalId = null;
                        }

                        const COOLDOWN_SECONDS = 3;
                        let remaining = COOLDOWN_SECONDS;
                        confirmBtn.textContent = `Далее (${remaining})`;
                        confirmBtn.disabled = true;

                        confirmBtn.onclick = async function() {
                            confirmBtn.disabled = true;
                            const nextFormData = new FormData();
                            nextFormData.append('next_round', 'true');
                            nextFormData.append('csrfmiddlewaretoken', CSRF_TOKEN);

                            try {
                                await fetch(window.location.href, {
                                    method: 'POST',
                                    body: nextFormData,
                                    headers: { 'X-CSRFToken': CSRF_TOKEN },
                                    credentials: 'same-origin'
                                });
                                window.location.reload();
                            } catch (err) {
                                console.error('Ошибка при переходе:', err);
                                alert('Ошибка: ' + err.message);
                            }
                        };

                        nextCooldownIntervalId = setInterval(() => {
                            remaining -= 1;
                            if (remaining <= 0) {
                                clearInterval(nextCooldownIntervalId);
                                nextCooldownIntervalId = null;
                                confirmBtn.textContent = 'Далее';
                                confirmBtn.disabled = false;
                                return;
                            }
                            confirmBtn.textContent = `Далее (${remaining})`;
                        }, 1000);
                    } else {
                        document.getElementById('last-score').textContent = data.score;
                        document.getElementById('total-score').textContent = data.total_score;
                        confirmBtn.textContent = 'Сохранить результат';
                        confirmBtn.disabled = false;
                    }
                } else {
                    alert(data.error || 'Ошибка сервера');
                }
            } catch (err) {
                console.error('Fetch error:', err);
                alert('Ошибка связи: ' + err.message);
            } finally {
                if (confirmBtn.textContent === 'Обработка...') {
                    confirmBtn.textContent = 'Подтвердить выбор';
                }
                if (confirmBtn.textContent === 'Подтвердить выбор') {
                    confirmBtn.disabled = false;
                }
            }
        });

        // Отправка имени
        document.getElementById('submit-name').addEventListener('click', async function() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Введите имя');

            const formData = new FormData();
            formData.append('submit_name', 'true');
            formData.append('name', name);
            formData.append('csrfmiddlewaretoken', CSRF_TOKEN);

            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': CSRF_TOKEN },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    alert('Рекорд сохранён!');
                    window.location.href = "{% url 'records' %}";
                } else {
                    document.getElementById('name-error').textContent = data.error;
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        });
    </script>
    {% include 'mainpage/_site_footer.html' %}
    <script src="{% static 'mainpage/script.js' %}"></script>
</body>
</html>
